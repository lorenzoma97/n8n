name: Deploy svezzamento-app to GitHub Pages

# Pubblica SOLO la cartella svezzamento-app/ su GitHub Pages.
# Non interferisce con gli altri workflow del repo.

on:
  push:
    branches:
      - master
      - claude/weaning-calendar-app-bdfw49
    paths:
      - 'svezzamento-app/**'
      - '.github/workflows/svezzamento-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact (solo svezzamento-app)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './svezzamento-app'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
